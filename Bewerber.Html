<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bewerber Dashboard - Azubi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{ background:#f5f0e8; }
        .sidebar{ background:white; border-radius:20px; padding:30px 20px; box-shadow:0 5px 20px rgba(0,0,0,0.08); height:100%; }
        .main-content{ background:white; border-radius:20px; padding:35px; box-shadow:0 5px 20px rgba(0,0,0,0.08); }
        .file-box{ border:2px dashed #cbd5e1; border-radius:15px; padding:25px; text-align:center; cursor:pointer; transition:0.3s; background:#faf7f2; }
        .file-box input{ display:none; }
        .submit-btn{ background:#d97706; color:white; padding:14px; border:none; border-radius:12px; width:100%; font-size:18px; }
    </style>
</head>
<body>

<section class="py-5">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-9">
                <div class="main-content">
                    <h2 class="fw-bold mb-4">Profil vervollständigen</h2>
                    
                    <!-- تم إضافة action يشير لملف المعالجة -->
                   <form action="update_profile.php" method="POST" enctype="multipart/form-data">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Gewünschter Beruf / Bereich</label>
            <select class="form-select" name="beruf" required>
                <option value="IT">IT & Informatik</option>
                <option value="Medizin">Medizin & Pflege</option>
                <option value="Bank">Banken & Finanzen</option>
                <option value="Handwerk">Handwerk</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Deutschniveau</label>
            <select class="form-select" name="language">
                <option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option>
            </select>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <label class="file-box w-100" id="cv-label">
                📄 Lebenslauf hochladen
                <input type="file" id="cv-file" name="cv_file">
            </label>
        </div>
        <div class="col-md-4">
            <label class="file-box w-100" id="cert-label">
                📜 Sprachzertifikat hochladen
                <input type="file" id="cert-file" name="cert_file">
            </label>
        </div>
        <div class="col-md-4">
            <label class="file-box w-100" id="diploma-label">
                🎓 Zeugnisse hochladen
                <input type="file" id="diploma-file" name="diploma_file">
            </label>
        </div>
    </div>

    <div class="mt-4">
        <button type="submit" class="submit-btn">Änderungen speichern</button>
    </div>
</form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    function updateFileLabel(inputId, labelId) {
        document.getElementById(inputId).addEventListener('change', function(){
            const fileName = this.files[0] ? this.files[0].name : "Datei wählen";
            document.getElementById(labelId).innerHTML = `✅ ${fileName}`;
        });
    }
    updateFileLabel('cv-file', 'cv-label');
    updateFileLabel('cert-file', 'cert-label');
    updateFileLabel('diploma-file', 'diploma-label');
</script>
</body>
</html>
